services:
  mysql:
    image: mysql:8.0
    container_name: courier_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rps@12345
      MYSQL_DATABASE: courier_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: .
    container_name: courier_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8089:8089"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/courier_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rps@12345

volumes:
  mysql_data:
