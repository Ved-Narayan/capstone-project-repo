apiVersion: apps/v1
kind: Deployment
metadata:
  name: courier-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: courier-backend
  template:
    metadata:
      labels:
        app: courier-backend
    spec:
      containers:
        - name: backend
          image: courier-backend:k8
          imagePullPolicy: Never
          ports:
            - containerPort: 8089
          envFrom:
            - configMapRef:
                name: courier-config
            - secretRef:
                name: courier-secret
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8089
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: courier-backend
spec:
  type: NodePort
  selector:
    app: courier-backend
  ports:
    - port: 8089
      targetPort: 8089
      nodePort: 30089
