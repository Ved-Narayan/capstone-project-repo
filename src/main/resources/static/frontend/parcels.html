<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parcels - CourierTrack</title>

<link rel="stylesheet" href="css/styles.css">
</head>

<body>

	<div class="app-container">

		
		<aside class="sidebar">

			<div class="sidebar-header">
				<div class="logo-mini">
					<svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
							stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
				</div>
				<h2>CourierTrack</h2>
			</div>

			<nav class="nav-menu">
				<a href="dashboard.html" class="nav-item">📊 Dashboard</a> <a
					href="shipments.html" class="nav-item">📦 Shipments</a> <a
					href="tracking.html" class="nav-item">📍 Tracking</a> <a
					href="parcels.html" class="nav-item active">📫 Parcels</a> <a
					href="delivery.html" class="nav-item">🚚 Delivery</a> <a
					href="customers.html" class="nav-item">👥 Customers</a>
			</nav>
			<div class="sidebar-footer">
				<button class="btn-logout" onclick="logout()">Logout</button>
			</div>

		</aside>

		
		<main class="main-content">

			<div class="content-wrapper">

				<!-- HEADER -->
				<div class="page-header">
					<h1>Parcels</h1>
					<button class="btn-primary" onclick="openParcelModal()">➕
						Add Parcel</button>

				</div>

				
				<div class="card">

					<table class="table">

						<thead>
							<tr>
								<th>Parcel ID</th>
								<th>Product</th>
								<th>Weight</th>
								<th>Date Of Booking</th>
							</tr>
						</thead>

						<tbody id="parcelsTable">

							<tr>
								<td colspan="6" style="text-align: center; padding: 20px;">
									Loading parcels...</td>
							</tr>

						</tbody>

					</table>

				</div>

			</div>

		</main>

	</div>
	<div id="parcelModal" class="modal">

		<div class="modal-content">

			<div class="modal-header">
				<h2>📦 Add Parcel</h2>
				<button class="btn-close" onclick="closeParcelModal()">✕</button>
			</div>

			<form id="parcelForm" class="modal-form">

				<input id="weight" type="number" step="0.1" placeholder="Weight"
					required> <input id="type" type="text"
					placeholder="Parcel Type (doc / non-doc)" required> <input
					id="fromAddress" type="text" placeholder="From Address" required>

				<input id="toAddress" type="text" placeholder="To Address" required>

				<input id="customerId" type="number" placeholder="Customer ID"
					required>

				<button type="submit" class="btn-primary full-btn">Create
					Parcel</button>

			</form>

		</div>

	</div>
	<script>

document.addEventListener("DOMContentLoaded", () => {
    loadParcels();
    setupParcelForm();
});

function openParcelModal() {
    document.getElementById("parcelModal").style.display = "flex";
}

function closeParcelModal() {
    document.getElementById("parcelModal").style.display = "none";
}


function setupParcelForm() {

    const form = document.getElementById("parcelForm");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const payload = {
            weight: document.getElementById("weight").value,
            type: document.getElementById("type").value,
            fromAddress: document.getElementById("fromAddress").value,
            toAddress: document.getElementById("toAddress").value,
            customerId: document.getElementById("customerId").value
        };

        await fetch(BASE_URL + "/parcels/addParcel", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        closeParcelModal();
        form.reset();
        loadParcels();
    });
}


</script>

	
	<script src="/frontend/js/api.js"></script>
	<script src="/frontend/js/parcels.js"></script>
	<script src="js/auth.js"></script>

</body>
</html>
