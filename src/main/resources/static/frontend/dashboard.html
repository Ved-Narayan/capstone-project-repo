<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - CourierTrack</title>

<link rel="stylesheet" href="css/styles.css">
</head>
<script>
    if (!localStorage.getItem('authToken')) {
        window.location.replace('adminlog.html');
    }
</script>

<body>

	<div class="app-container">

		
		<aside class="sidebar">


			<div class="sidebar-header">
				<h2>CourierTrack</h2>
			</div>

			<nav class="nav-menu">

				<a href="dashboard.html" class="nav-item active">📊 Dashboard</a> <a
					href="shipments.html" class="nav-item">📦 Shipments</a> <a
					href="tracking.html" class="nav-item">📍 Tracking</a> <a
					href="parcels.html" class="nav-item">📫 Parcels</a> <a
					href="delivery.html" class="nav-item">🚚 Delivery</a> <a
					href="customers.html" class="nav-item">👥 Customers</a>

			</nav>
			<div class="sidebar-footer">
				<button class="btn-logout" onclick="logout()">Logout</button>
			</div>

		</aside>

		
		<main class="main-content">

			<div class="content-wrapper">

				
				<div class="page-header">
					<h1>Dashboard</h1>
					<p>Live system overview</p>
				</div>

				
				<div class="stats-grid">

					<div class="stat-card">
						<div class="stat-icon">👥</div>
						<div class="stat-content">
							<p>Customers</p>
							<h2 id="customerCount">0</h2>
						</div>
					</div>

					<div class="stat-card">
						<div class="stat-icon">📦</div>
						<div class="stat-content">
							<p>Parcels</p>
							<h2 id="parcelCount">0</h2>
						</div>
					</div>

					<div class="stat-card">
						<div class="stat-icon">🚚</div>
						<div class="stat-content">
							<p>Shipments</p>
							<h2 id="shipmentCount">0</h2>
						</div>
					</div>

					<div class="stat-card">
						<div class="stat-icon">📍</div>
						<div class="stat-content">
							<p>Deliveries</p>
							<h2 id="deliveryCount">0</h2>
						</div>
					</div>

				</div>

				
				<div class="card">

					<div class="card-header">
						<h2>Recent Shipments</h2>
					</div>

					<table class="table">

						<thead>
							<tr>
								<th>ID</th>
								
								<th>Status</th>
								<th>Date</th>
							</tr>
						</thead>

						<tbody id="recentShipments">

							<tr>
								<td colspan="5">Loading...</td>
							</tr>

						</tbody>

					</table>

				</div>

			</div>

		</main>

	</div>

	
	<script src="js/api.js"></script>
	<script src="js/dashboard.js"></script>
	<script src="js/auth.js"></script>

</body>
</html>
