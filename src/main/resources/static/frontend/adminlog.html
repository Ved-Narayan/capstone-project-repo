<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourierTrack - Shipping Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0f172a;
            --primary: #1e293b;
            --accent-blue: #3b82f6;
            --accent-blue-dark: #1d4ed8;
            --accent-orange: #f97316;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --border-light: #e5e7eb;
            --bg-light: #f9fafb;
            --white: #ffffff;
            --error: #dc2626;
            --success: #10b981;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--white) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .back-link {
            margin-bottom: 2rem;
        }

        .back-link a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .back-link a:hover {
            color: var(--accent-blue-dark);
            gap: 1rem;
        }

        .login-box {
            background: var(--white);
            border-radius: 12px;
            border: 2px solid var(--accent-blue);
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.1);
            padding: 2.5rem;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            color: var(--accent-blue);
        }

        .logo-section h1 {
            color: var(--accent-blue);
            font-size: 1.8rem;
            margin: 0;
            font-weight: 800;
        }

        .logo-section p {
            color: var(--text-light);
            font-size: 0.95rem;
            text-align: center;
            width: 100%;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
            background: var(--white);
        }

        .form-group input::placeholder {
            color: #d1d5db;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group input.error {
            border-color: var(--error);
            background-color: rgba(220, 38, 38, 0.05);
        }

        .error-message {
            color: var(--error);
            font-size: 0.85rem;
            display: none;
            margin-top: 0.3rem;
        }

        .error-message.show {
            display: block;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent-blue);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.2);
        }

        .login-btn:hover {
            background: var(--accent-blue-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 0.8rem;
            border-radius: 6px;
            display: none;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .success-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-footer {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-light);
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .login-footer p {
            margin: 0;
            line-height: 1.5;
        }

        .login-footer strong {
            color: var(--text-dark);
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 2rem;
            }

            .logo-section {
                flex-direction: column;
                gap: 0.5rem;
            }

            .logo-section h1 {
                font-size: 1.5rem;
            }

            .logo-icon {
                width: 36px;
                height: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="back-link">
            <a href="index.html">← Back to Home</a>
        </div>

        <div class="login-box">
            <div class="logo-section">
                <svg class="logo-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                <h1>CourierTrack</h1>
            </div>
            <p class="tagline" style="text-align: center; color: var(--text-light); margin-bottom: 1.5rem;">Professional Shipping Management</p>

            <div class="success-message" id="successMessage">
                ✓ Login successful! Loading dashboard...
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="admin@example.com" 
                        required
                    >
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••" 
                        required
                    >
                    <div class="error-message" id="passwordError"></div>
                </div>

                <button type="submit" class="btn-login login-btn" id="loginBtn">Sign In</button>
            </form>

            <div class="login-footer">
                <p>Demo Credentials: <strong>admin@example.com</strong> / <strong>password123</strong></p>
            </div>
            
        </div>
    </div>

    <script>
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        emailInput.addEventListener('input', () => clearError('email'));
        passwordInput.addEventListener('input', () => clearError('password'));

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            handleLogin();
        });

        function validateForm() {
            let isValid = true;

            if (!emailInput.value.trim()) {
                showError('email', 'Email is required');
                isValid = false;
            } else if (!emailRegex.test(emailInput.value)) {
                showError('email', 'Please enter a valid email address');
                isValid = false;
            }

            if (!passwordInput.value.trim()) {
                showError('password', 'Password is required');
                isValid = false;
            } else if (passwordInput.value.length < 6) {
                showError('password', 'Password must be at least 6 characters');
                isValid = false;
            }

            return isValid;
        }

        function showError(fieldName, message) {
            const errorElement = document.getElementById(fieldName + 'Error');
            const inputElement = fieldName === 'email' ? emailInput : passwordInput;
            errorElement.textContent = message;
            errorElement.classList.add('show');
            inputElement.classList.add('error');
        }

        function clearError(fieldName) {
            const errorElement = document.getElementById(fieldName + 'Error');
            const inputElement = fieldName === 'email' ? emailInput : passwordInput;
            errorElement.textContent = '';
            errorElement.classList.remove('show');
            inputElement.classList.remove('error');
        }

        function handleLogin() {
            if (!validateForm()) return;

            const emailValue = emailInput.value.trim();
            const passwordValue = passwordInput.value.trim();

            
            const correctEmail = "admin@example.com";
            const correctPassword = "password123";

            
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            setTimeout(() => {

                
                if (emailValue !== correctEmail || passwordValue !== correctPassword) {

                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';

                    showError('email', 'Incorrect email or password');
                    showError('password', 'Incorrect email or password');

                    return;
                }

                localStorage.setItem('authToken', 'valid-user');
                localStorage.setItem('userEmail', emailValue);

                window.location.href = "dashboard.html";

            }, 1000);
        }
    </script>
</body>
</html>
